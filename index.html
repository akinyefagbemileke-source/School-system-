<!DOCTYPE html>
<html>
<head>
    <title>School Portal</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }

        #msg {
            color: red;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>School Login</h2>

    <select id="role">
        <option value="admin">Admin</option>
        <option value="student">Student</option>
        <option value="parent">Parent</option>
    </select>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<script>
function login() {
    var role = document.getElementById("role").value;
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    const users = {
        admin: { username: "admin", password: "1234" },
        student: { username: "john", password: "1111" },
        parent: { username: "parent", password: "2222" }
    };

    if (user === "" || pass === "") {
        document.getElementById("msg").innerHTML = "Fill all fields";
        return;
    }

    if (
        users[role] &&
        user === users[role].username &&
        pass === users[role].password
    ) {
        localStorage.setItem("currentUser", user);

        if (role === "admin") {
            window.location.href = "admin.html";
        } 
        else if (role === "student") {
            window.location.href = "student.html";
        } 
        else {
            window.location.href = "parent.html";
        }

    } else {
        document.getElementById("msg").innerHTML = "Invalid login details";
    }
}
</script>

</body>
</html>
