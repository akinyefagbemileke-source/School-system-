<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef2f7;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            width: 90%;
            margin: 20px auto;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .summary {
            display: flex;
            justify-content: space-between;
            text-align: center;
        }

        .box {
            width: 48%;
            padding: 15px;
            border-radius: 10px;
            color: white;
        }

        .total {
            background: #3498db;
        }

        .average {
            background: #27ae60;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .logout {
            display: block;
            width: 200px;
            margin: 20px auto;
            text-align: center;
            background: red;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-decoration: none;
        }
    </style>

</head>

<body>

<div class="header">
    🎓 Student Dashboard
</div>

<div class="container">

    <div class="card">
        <h3>Your Results</h3>

        <table>
            <tr>
                <th>Subject</th>
                <th>Score</th>
                <th>Grade</th>
                <th>Remark</th>
            </tr>
            <tbody id="result"></tbody>
        </table>
    </div>

    <div class="card summary">
        <div class="box total">
            <h3>Total</h3>
            <p id="total"></p>
        </div>

        <div class="box average">
            <h3>Average</h3>
            <p id="average"></p>
        </div>
    </div>

</div>

<script>
let currentUser = localStorage.getItem("currentUser");
let data = JSON.parse(localStorage.getItem("results"));

let total = 0;
let count = 0;
let output = "";

if (data && data.length > 0) {

    data.forEach(function(item) {

        if (item.name.toLowerCase() === currentUser.toLowerCase()) {

            let score = parseInt(item.score);
            let grade = "";
            let remark = "";

            if (score >= 70) {
                grade = "A";
                remark = "Excellent";
            } else if (score >= 60) {
                grade = "B";
                remark = "Very Good";
            } else if (score >= 50) {
                grade = "C";
                remark = "Good";
            } else {
                grade = "F";
                remark = "Fail";
            }

            total += score;
            count++;

            output += `
            <tr>
                <td>${item.subject}</td>
                <td>${score}</td>
                <td>${grade}</td>
                <td>${remark}</td>
            </tr>
            `;
        }
    });

    if (count > 0) {
        let average = (total / count).toFixed(2);

        document.getElementById("total").innerText = total;
        document.getElementById("average").innerText = average;
    } else {
        output = "<tr><td colspan='4'>No result found</td></tr>";
    }

    document.getElementById("result").innerHTML = output;

} else {
    document.getElementById("result").innerHTML = "<tr><td colspan='4'>No result available</td></tr>";
}
</script>

<a href="index.html" class="logout">Logout</a>

</body>
</html>
